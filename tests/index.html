<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marathon Training Engine — Test Suite</title>
  <style>
    :root {
      --c-bg:       #111;
      --c-surface:  #1a1a1a;
      --c-border:   #2a2a2a;
      --c-pass:     #4ade80;
      --c-fail:     #f87171;
      --c-warn:     #facc15;
      --c-text:     #e5e7eb;
      --c-dim:      #9ca3af;
      --c-accent:   #6366f1;
      --c-btn:      #4f46e5;
      --r:          6px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Courier New', monospace;
      background: var(--c-bg);
      color: var(--c-text);
      padding: 24px;
      line-height: 1.6;
    }
    h1 { font-size: 1.4rem; margin-bottom: 4px; color: var(--c-accent); }
    .subtitle { color: var(--c-dim); font-size: 0.85rem; margin-bottom: 20px; }

    /* Toolbar */
    .toolbar {
      display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px;
    }
    button {
      padding: 8px 18px; border: none; border-radius: var(--r);
      cursor: pointer; font-family: inherit; font-size: 0.85rem;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    .btn-primary  { background: var(--c-btn); color: white; }
    .btn-export   { background: #374151; color: white; }
    .btn-clear    { background: #4b1c1c; color: #fca5a5; }

    /* Summary bar */
    .summary-bar {
      display: flex; gap: 16px; align-items: center;
      padding: 10px 14px; background: var(--c-surface);
      border: 1px solid var(--c-border); border-radius: var(--r);
      margin-bottom: 20px; font-size: 0.85rem;
    }
    .s-pass  { color: var(--c-pass); font-weight: bold; }
    .s-fail  { color: var(--c-fail); font-weight: bold; }
    .s-total { color: var(--c-dim); }
    .s-time  { color: var(--c-dim); margin-left: auto; }

    /* Groups */
    .group { margin-bottom: 20px; }
    .group-header {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 14px; background: var(--c-surface);
      border: 1px solid var(--c-border); border-radius: var(--r) var(--r) 0 0;
      font-size: 0.9rem; font-weight: bold; cursor: pointer;
      user-select: none;
    }
    .group-header:hover { background: #222; }
    .group-badge {
      padding: 2px 8px; border-radius: 999px; font-size: 0.7rem;
    }
    .badge-pass { background: #052e16; color: var(--c-pass); }
    .badge-fail { background: #4b1c1c; color: var(--c-fail); }
    .badge-mix  { background: #3b2802; color: var(--c-warn); }
    .group-body {
      border: 1px solid var(--c-border); border-top: none;
      border-radius: 0 0 var(--r) var(--r); overflow: hidden;
    }
    .group-body.collapsed { display: none; }

    /* Test rows */
    .test-row {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 7px 14px; border-bottom: 1px solid var(--c-border);
      font-size: 0.82rem;
    }
    .test-row:last-child { border-bottom: none; }
    .test-icon { flex-shrink: 0; width: 16px; margin-top: 1px; }
    .pass .test-icon { color: var(--c-pass); }
    .fail .test-icon { color: var(--c-fail); }
    .test-name { flex: 1; }
    .test-err  { color: var(--c-fail); font-size: 0.78rem; margin-top: 3px; }

    /* Log panel */
    .log-panel {
      margin-top: 24px; padding: 14px;
      background: var(--c-surface); border: 1px solid var(--c-border);
      border-radius: var(--r);
    }
    .log-panel h3 { font-size: 0.85rem; color: var(--c-dim); margin-bottom: 10px; }
    .log-entry {
      font-size: 0.78rem; color: var(--c-dim);
      border-bottom: 1px solid var(--c-border); padding: 5px 0;
    }
    .log-entry:last-child { border-bottom: none; }
    .log-entry .ts { color: #6b7280; }
    .log-entry .pass-c { color: var(--c-pass); }
    .log-entry .fail-c { color: var(--c-fail); }

    #status { color: var(--c-dim); font-size: 0.8rem; min-height: 1.4em; }
  </style>
</head>
<body>
  <h1>Marathon Training Engine — Test Suite</h1>
  <p class="subtitle">Unit tests for all engine modules • Results stored in localStorage</p>

  <div class="toolbar">
    <button class="btn-primary" id="btn-run-all">▶ Run All Tests</button>
    <button class="btn-export" id="btn-export">⬇ Export Test Log</button>
    <button class="btn-clear"  id="btn-clear-log">✕ Clear Log</button>
  </div>

  <div class="summary-bar" id="summary-bar" style="display:none">
    <span class="s-pass" id="s-pass">0 passed</span>
    <span class="s-fail" id="s-fail">0 failed</span>
    <span class="s-total" id="s-total">of 0</span>
    <span class="s-time"  id="s-time"></span>
  </div>

  <div id="status">Ready. Click "Run All Tests" to begin.</div>
  <div id="results"></div>

  <div class="log-panel" id="log-panel">
    <h3>Run History (localStorage)</h3>
    <div id="log-list"><span style="color:var(--c-dim);font-size:0.8rem">No runs yet.</span></div>
  </div>

<script type="module">
// ============================================================
// Test framework
// ============================================================
const STORAGE_KEY = 'marathon_test_log';

let currentGroup = null;
let groups = {};
let passTotal = 0, failTotal = 0;

function group(name) {
  currentGroup = name;
  if (!groups[name]) groups[name] = { tests: [], pass: 0, fail: 0 };
}

function test(name, fn) {
  const g = groups[currentGroup] || (groups[currentGroup] = { tests: [], pass: 0, fail: 0 });
  try {
    fn();
    g.tests.push({ name, ok: true });
    g.pass++;
    passTotal++;
  } catch (e) {
    g.tests.push({ name, ok: false, err: e.message });
    g.fail++;
    failTotal++;
  }
}

function assert(cond, msg) {
  if (!cond) throw new Error(msg || 'Assertion failed');
}
function assertEq(a, b, msg) {
  if (a !== b) throw new Error(`${msg||''} Expected ${b}, got ${a}`);
}
function assertApprox(a, b, tol, msg) {
  if (Math.abs(a - b) > tol) throw new Error(`${msg||''} Expected ~${b}±${tol}, got ${a}`);
}
function assertLte(a, b, msg) {
  if (a > b) throw new Error(`${msg||''} Expected ${a} <= ${b}`);
}
function assertGte(a, b, msg) {
  if (a < b) throw new Error(`${msg||''} Expected ${a} >= ${b}`);
}

// ============================================================
// Import engine modules
// ============================================================
import { optimizeBlocks, isPyramidal, isUniform } from '../engine/blockOptimizer.js';
import { progressWeeklyMileageByBlocks, calculateGrowthRate } from '../engine/mileageProgression.js';
import { calculateDistances } from '../engine/distanceAllocation.js';
import { getSessionTableName } from '../engine/sessionSelector.js';
import { isTaperDay, getTaperSession } from '../engine/taperProtocol.js';
import { createDateScaffold, getNextMonday, getDayName } from '../engine/dateScaffold.js';

// ============================================================
// A) Block Optimiser
// ============================================================
group('Block Optimiser');

test('optimizeBlocks returns ≤5 blocks', () => {
  const r = optimizeBlocks(200, new Date());
  assertLte(r.planBlockCount, 5, 'Too many blocks');
  assert(r.planBlockCount >= 1, 'Need at least 1 block');
});

test('optimizeBlocks returns blocks array with correct shape', () => {
  const r = optimizeBlocks(200, new Date());
  assert(Array.isArray(r.blocks), 'blocks must be array');
  assert(r.blocks.length === r.planBlockCount, 'array length = planBlockCount');
  r.blocks.forEach(b => {
    assert([8,10,12].includes(b.blockWeeks), `Invalid blockWeeks: ${b.blockWeeks}`);
    assertEq(b.deloadWeeks, 2, 'deloadWeeks should be 2');
    assertEq(b.sessionWeeks, b.blockWeeks - 2, 'sessionWeeks = blockWeeks - 2');
  });
});

test('optimizeBlocks prefers 3 blocks when plan is ~200 days', () => {
  // 200 days → should find a 3-block solution
  const r = optimizeBlocks(200, new Date());
  // May not always be exactly 3 depending on day count, but should be ≤5
  assertLte(r.planBlockCount, 5);
});

test('optimizeBlocks taperStartDayIndex = maxDayCount - 17', () => {
  const r = optimizeBlocks(210, new Date());
  assertEq(r.taperStartDayIndex, 210 - 17, 'taper must start at maxDayCount-17');
});

test('pyramidal shape: [8,10,12,8] is valid', () => {
  assert(isPyramidal([8,10,12,8]), '[8,10,12,8] should be pyramidal');
});

test('pyramidal shape: [8,10,10,8] is valid', () => {
  assert(isPyramidal([8,10,10,8]));
});

test('pyramidal shape: [8,8,10,12,10] is valid', () => {
  assert(isPyramidal([8,8,10,12,10]));
});

test('pyramidal shape: [8,12,12,10] is INVALID (+4 jump)', () => {
  assert(!isPyramidal([8,12,12,10]), '[8,12,12,10] should fail — +4 jump');
});

test('pyramidal shape: [8,12,8,10,10] is INVALID (valley then rise)', () => {
  assert(!isPyramidal([8,12,8,10,10]), 'Should fail — valley then rise');
});

test('uniform [10,10,10] is uniform and pyramidal', () => {
  assert(isUniform([10,10,10]));
  assert(isPyramidal([10,10,10]));
});

test('optimizeBlocks handles short plans (60 days)', () => {
  const r = optimizeBlocks(60, new Date());
  assert(r.planBlockCount >= 1);
  assert(Array.isArray(r.blocks));
});

test('optimizeBlocks: block sequence is pyramidal or uniform', () => {
  for (const days of [140, 180, 210, 250, 280]) {
    const r = optimizeBlocks(days, new Date());
    const lengths = r.blocks.map(b => b.blockWeeks);
    assert(
      isPyramidal(lengths) || isUniform(lengths),
      `${days}-day plan produced neither pyramidal nor uniform: [${lengths}]`
    );
  }
});

test('optimizeBlocks: no consecutive increase > +2 weeks', () => {
  for (const days of [140, 180, 210, 250]) {
    const r = optimizeBlocks(days, new Date());
    const lengths = r.blocks.map(b => b.blockWeeks);
    for (let i = 1; i < lengths.length; i++) {
      const diff = lengths[i] - lengths[i-1];
      assert(diff <= 2, `[${lengths}] has +${diff} jump at position ${i}`);
    }
  }
});

// ============================================================
// B) Mileage Progression
// ============================================================
group('Mileage Progression');

function makeMockBlocks(blockSizes) {
  return blockSizes.map((bw, i) => ({
    blockIndex:   i,
    blockWeeks:   bw,
    sessionWeeks: bw - 2,
    deloadWeeks:  2
  }));
}

test('no weekly increase > 10%', () => {
  const blocks = makeMockBlocks([8, 10, 12]);
  const data   = progressWeeklyMileageByBlocks(40, 100, blocks);
  for (let i = 1; i < data.length; i++) {
    if (!data[i-1].isDeload && !data[i].isDeload) {
      const inc = (data[i].weekMileage - data[i-1].weekMileage) / data[i-1].weekMileage;
      assertLte(inc, 0.101, `Week ${i}: increase ${(inc*100).toFixed(1)}% exceeds 10%`);
    }
  }
});

test('never exceeds user target mileage', () => {
  const blocks = makeMockBlocks([8, 10, 12]);
  const target = 90;
  const data   = progressWeeklyMileageByBlocks(40, target, blocks);
  data.forEach((w, i) => {
    assertLte(w.weekMileage, target + 1, `Week ${i} mileage ${w.weekMileage} exceeds target ${target}`);
  });
});

test('peak plateau exactly 2 weeks before deload', () => {
  const blocks = makeMockBlocks([8, 10]);
  const data   = progressWeeklyMileageByBlocks(40, 80, blocks);
  // For block 0 (8-week): weeks 1-4 ramp, weeks 5-6 peak, weeks 7-8 deload
  // Block 0 data indices: 0..7 (8 weeks)
  // Peak weeks should be at weekInBlock = 5 and 6 (indices 4 and 5 within block)
  const block0 = data.filter(d => d.blockIndex === 0);
  const peaks  = block0.filter(d => d.isPeak);
  assertEq(peaks.length, 2, `Block 0 should have exactly 2 peak weeks, got ${peaks.length}`);
  const deloads = block0.filter(d => d.isDeload);
  assertEq(deloads.length, 2, `Block 0 should have exactly 2 deload weeks, got ${deloads.length}`);
  // Peak should come before deload
  const lastPeakIdx   = block0.indexOf(peaks[peaks.length - 1]);
  const firstDeloadIdx = block0.indexOf(deloads[0]);
  assert(lastPeakIdx < firstDeloadIdx, 'Peak must come before deload');
});

test('deload week 1 is ~80% of block peak, week 2 is ~70%', () => {
  const blocks = makeMockBlocks([8]);
  const data   = progressWeeklyMileageByBlocks(40, 80, blocks);
  const deloads = data.filter(d => d.isDeload);
  const peak    = Math.max(...data.filter(d => d.isPeak).map(d => d.weekMileage));
  assertApprox(deloads[0].weekMileage, peak * 0.80, peak * 0.05, 'Deload week 1 should be ~80% of peak');
  assertApprox(deloads[1].weekMileage, peak * 0.70, peak * 0.05, 'Deload week 2 should be ~70% of peak');
});

test('different block lengths produce different ramp rates', () => {
  const b8  = makeMockBlocks([8]);
  const b12 = makeMockBlocks([12]);
  const d8  = progressWeeklyMileageByBlocks(40, 80, b8);
  const d12 = progressWeeklyMileageByBlocks(40, 80, b12);
  // 8-week block has fewer ramp weeks → steeper per-week rate
  const ramp8  = d8.filter(d => !d.isDeload && !d.isPeak);
  const ramp12 = d12.filter(d => !d.isDeload && !d.isPeak);
  assert(ramp8.length < ramp12.length, '8-week block should have fewer ramp weeks than 12-week');
});

test('total weeks = sum of blockWeeks', () => {
  const blocks = makeMockBlocks([8, 10, 12]);
  const data   = progressWeeklyMileageByBlocks(40, 100, blocks);
  const totalExpected = 8 + 10 + 12;
  assertEq(data.length, totalExpected, `Expected ${totalExpected} week entries`);
});

// ============================================================
// C) Distance Allocation
// ============================================================
group('Distance Allocation');

test('long run ≤ 38km', () => {
  [50, 80, 120].forEach(km => {
    const d = calculateDistances(km, 4);
    assertLte(d.longRunKm, 38, `${km}km/week: longRun ${d.longRunKm} > 38`);
  });
});

test('long run ≤ 40% of weekly total', () => {
  [50, 80, 120].forEach(km => {
    const d = calculateDistances(km, 4);
    assertLte(d.longRunKm / km, 0.401, `${km}km/week: longRun ratio ${(d.longRunKm/km).toFixed(2)} > 40%`);
  });
});

test('intensity = 20% of weekly total (rounded)', () => {
  [60, 80, 100].forEach(km => {
    const d   = calculateDistances(km, 4);
    const exp = Math.round(km * 0.20);
    assertEq(d.intensityWeeklyKm, exp, `${km}km/week: intensity ${d.intensityWeeklyKm} ≠ ${exp}`);
  });
});

test('base = totalWeekly - longRun - intensity', () => {
  [60, 80].forEach(km => {
    const d = calculateDistances(km, 4);
    assertEq(d.baseWeeklyKm, km - d.longRunKm - d.intensityWeeklyKm,
      `base should equal remainder`);
  });
});

test('intensityPerSessionMeters = intensity/2 in meters', () => {
  const d = calculateDistances(80, 4);
  assertEq(d.intensityPerSessionMeters, Math.round(d.intensityWeeklyKm * 500),
    'Per-session intensity should be half of weekly intensity in meters');
});

test('legacy intensityMileage alias matches intensityPerSessionMeters', () => {
  const d = calculateDistances(80, 4);
  assertEq(d.intensityMileage, d.intensityPerSessionMeters, 'Legacy alias mismatch');
});

test('5-session week has wednesdayBaseMileage > 0', () => {
  const d = calculateDistances(80, 5);
  assert(d.wednesdayBaseMileage > 0, 'Wednesday base should be > 0 for 5-session week');
});

test('3-session week has wednesdayBaseMileage = 0', () => {
  const d = calculateDistances(60, 3);
  assertEq(d.wednesdayBaseMileage, 0, 'Wednesday base should be 0 for 3-session week');
});

// ============================================================
// D) Session Selector
// ============================================================
group('Session Selector');

test('getSessionTableName Speed week 1 block 8', () => {
  assertEq(getSessionTableName('Speed', 1, 8), 'Speed_EvenBlocks');
});

test('getSessionTableName Speed week 1 block 12', () => {
  assertEq(getSessionTableName('Speed', 1, 12), 'Speed_EvenBlocks');
});

test('getSessionTableName SE week 2 block 12', () => {
  assertEq(getSessionTableName('SE', 2, 12), 'SE_Pyramid');
});

test('getSessionTableName Tempo odd week', () => {
  assertEq(getSessionTableName('Tempo', 3, 10), 'Tempo_EvenBlocks');
});

test('getSessionTableName Tempo even week', () => {
  assertEq(getSessionTableName('Tempo', 4, 10), 'Tempo_CutDown');
});

test('getSessionTableName Speed week 1 block 10', () => {
  assertEq(getSessionTableName('Speed', 1, 10), 'Speed_EvenBlocks');
});

test('getSessionTableName SE week 8 block 10 = SE_ReversePyramid', () => {
  assertEq(getSessionTableName('SE', 8, 10), 'SE_ReversePyramid');
});

// ============================================================
// E) Taper Protocol
// ============================================================
group('Taper Protocol');

test('isTaperDay identifies taper window correctly', () => {
  assert(isTaperDay(184, 200) === true,  'Day 184/200 should be taper (offset 16)');
  assert(isTaperDay(183, 200) === true,  'Day 183/200 should be taper (offset 17)');
  assert(isTaperDay(182, 200) === false, 'Day 182/200 should NOT be taper');
  assert(isTaperDay(100, 200) === false, 'Day 100/200 should not be taper');
});

test('race day returns Race Day session', () => {
  const s = getTaperSession(200, 200, 'Rest');
  assertEq(s.focusArea, 'Race Day');
  assertEq(s.totalDistance, 42.2);
});

test('day before race = shakeout', () => {
  const s = getTaperSession(199, 200, 'Rest');
  assertEq(s.focusArea, 'Pre-Race Shakeout');
});

test('offset 14 = 30km long run', () => {
  const s = getTaperSession(186, 200, 'Rest');
  assertEq(s.totalDistance, 30);
});

test('offset 7 = 21km long run', () => {
  const s = getTaperSession(193, 200, 'Rest');
  assertEq(s.totalDistance, 21);
});

// ============================================================
// F) Date Scaffold
// ============================================================
group('Date Scaffold');

test('getNextMonday from Wednesday', () => {
  const wed = new Date(2025, 5, 4);
  const mon = getNextMonday(wed);
  assertEq(mon.getDay(), 1, 'Should be Monday');
  assert(mon >= wed, 'Should be in the future');
});

test('getNextMonday from Monday returns same day', () => {
  const mon = new Date(2025, 5, 2);
  const res = getNextMonday(mon);
  assertEq(res.getDate(), 2, 'Should be same day');
});

test('createDateScaffold starts on Monday', () => {
  const start = new Date(2025, 0, 6);
  const end   = new Date(2025, 3, 6);
  const sc    = createDateScaffold(start, end);
  assertEq(sc[0].dayOfWeek, 'Monday', 'First day should be Monday');
});

test('getDayName returns correct names', () => {
  assertEq(getDayName(new Date(2025, 5, 2)), 'Monday');
  assertEq(getDayName(new Date(2025, 5, 7)), 'Saturday');
});

// ============================================================
// Render results
// ============================================================
function renderResults() {
  const $results = document.getElementById('results');
  $results.innerHTML = '';

  Object.entries(groups).forEach(([name, g]) => {
    const allPass = g.fail === 0;
    const anyFail = g.fail > 0;
    const badgeClass = allPass ? 'badge-pass' : anyFail ? (g.pass > 0 ? 'badge-mix' : 'badge-fail') : 'badge-pass';
    const badgeLabel = `${g.pass}/${g.pass + g.fail}`;

    const headerEl = document.createElement('div');
    headerEl.className = 'group';

    const open = !anyFail; // auto-collapse passing groups
    headerEl.innerHTML = `
      <div class="group-header" onclick="this.nextElementSibling.classList.toggle('collapsed')">
        <span>${name}</span>
        <span class="group-badge ${badgeClass}">${badgeLabel}</span>
      </div>
      <div class="group-body ${open ? '' : 'collapsed'}">
        ${g.tests.map(t => `
          <div class="test-row ${t.ok ? 'pass' : 'fail'}">
            <span class="test-icon">${t.ok ? '✓' : '✗'}</span>
            <div>
              <div class="test-name">${t.name}</div>
              ${t.err ? `<div class="test-err">${t.err}</div>` : ''}
            </div>
          </div>`).join('')}
      </div>`;
    $results.appendChild(headerEl);
  });
}

function updateSummary(elapsed) {
  const total = passTotal + failTotal;
  document.getElementById('summary-bar').style.display = 'flex';
  document.getElementById('s-pass').textContent  = `${passTotal} passed`;
  document.getElementById('s-fail').textContent  = `${failTotal} failed`;
  document.getElementById('s-total').textContent = `of ${total}`;
  document.getElementById('s-time').textContent  = `${elapsed}ms`;
}

function persistRun(elapsed) {
  const runs = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  runs.unshift({
    timestamp:   new Date().toISOString(),
    passCount:   passTotal,
    failCount:   failTotal,
    totalCount:  passTotal + failTotal,
    elapsedMs:   elapsed,
    failedTests: Object.values(groups)
      .flatMap(g => g.tests.filter(t => !t.ok).map(t => t.name)),
    userAgent:   navigator.userAgent
  });
  // Keep last 50 runs
  localStorage.setItem(STORAGE_KEY, JSON.stringify(runs.slice(0, 50)));
}

function renderLog() {
  const runs = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  const $list = document.getElementById('log-list');
  if (runs.length === 0) {
    $list.innerHTML = '<span style="color:var(--c-dim);font-size:0.8rem">No runs yet.</span>';
    return;
  }
  $list.innerHTML = runs.map(r => `
    <div class="log-entry">
      <span class="ts">${new Date(r.timestamp).toLocaleString()}</span>
      &nbsp;—&nbsp;
      <span class="pass-c">${r.passCount}✓</span>
      <span class="fail-c"> ${r.failCount}✗</span>
      <span style="color:var(--c-dim)"> / ${r.totalCount} (${r.elapsedMs}ms)</span>
      ${r.failedTests.length ? `<div style="color:var(--c-fail);font-size:0.72rem;margin-top:2px">${r.failedTests.join(', ')}</div>` : ''}
    </div>`).join('');
}

async function runAll() {
  // Reset state
  groups = {};
  passTotal = 0;
  failTotal = 0;
  currentGroup = 'Ungrouped';
  document.getElementById('results').innerHTML = '';
  document.getElementById('status').textContent = 'Running…';

  const t0 = performance.now();

  // Re-import and re-run (modules are cached; tests are re-run inline)
  // Since we've already run all tests above at module load time,
  // we just re-render. For a true "re-run", reload the page.
  // Here we trigger a page reload to re-execute all tests fresh.
  window.location.reload();
}

// Run once on load
const t0 = performance.now();
// Tests already ran above; render now
setTimeout(() => {
  const elapsed = Math.round(performance.now() - t0);
  renderResults();
  updateSummary(elapsed);
  persistRun(elapsed);
  renderLog();
  document.getElementById('status').textContent =
    `Completed in ${elapsed}ms — ${passTotal} passed, ${failTotal} failed`;
}, 0);

// Toolbar handlers
document.getElementById('btn-run-all').addEventListener('click', () => {
  window.location.reload();
});

document.getElementById('btn-export').addEventListener('click', () => {
  const runs = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  const blob = new Blob([JSON.stringify(runs, null, 2)], { type: 'application/json' });
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = `test-log-${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
});

document.getElementById('btn-clear-log').addEventListener('click', () => {
  localStorage.removeItem(STORAGE_KEY);
  renderLog();
});
</script>
</body>
</html>
