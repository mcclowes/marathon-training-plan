version: 2
updates:
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      types:
        patterns:
          - "@types/*"
      testing:
        patterns:
          - vitest
          - "@vitest/*"
          - "@testing-library/*"
          - "@playwright/*"
          - jsdom
      next:
        patterns:
          - next
          - eslint-config-next
      react:
        patterns:
          - react
          - react-dom
          - "@types/react"
          - "@types/react-dom"
    ignore:
      - dependency-name: next-auth
        update-types: ["version-update:semver-minor", "version-update:semver-patch"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
