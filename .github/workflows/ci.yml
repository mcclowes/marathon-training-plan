name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    name: typecheck + test + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm lint

      - run: pnpm test

      - run: pnpm build
        env:
          # Build-time placeholders — the app reads these at runtime too, but
          # `next build` doesn't need real values to complete.
          AUTH_SECRET: ci-only-build-secret-ci-only-build-secret=
          STRAVA_CLIENT_ID: "0"
          STRAVA_CLIENT_SECRET: "0"
          BLOB_READ_WRITE_TOKEN: "ci-placeholder"

  e2e:
    name: playwright smoke
    needs: web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec playwright install --with-deps chromium

      - run: pnpm test:e2e
        env:
          AUTH_SECRET: ci-only-build-secret-ci-only-build-secret=
          AUTH_TRUST_HOST: "true"
          STRAVA_CLIENT_ID: "0"
          STRAVA_CLIENT_SECRET: "0"
          BLOB_READ_WRITE_TOKEN: "ci-placeholder"

      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report
          retention-days: 7
